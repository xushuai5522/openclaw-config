<script>

    let times = null;

    let sec = 60;
    document.addEventListener("DOMContentLoaded", function() {
        var vm = new Vue({
            el: "#server-login-wrap",
            data() {
                const rReg = /^1[3-9]\d{9}$/;
                const validatePass = (rule, value, callback) => {
                    if(!value){
                        callback(new Error('手机号码不能为空！'));
                    }
                    else if (!(rReg.test(value))) {
                        callback(new Error('手机号码格式有误！'));
                    } else {
                        callback();
                    }
                };
                return {
                    loginType: 'smsLogin',
                    codeBtnText: '获取验证码',
                    formData:{
                        phone: '',
                        code: '',
                        password: ''
                    },
                    ruleValidate: {
                        phone: [
                            { validator: validatePass,trigger:'submit' }
                        ],
                        code: [
                            { required: true, message: '请输入验证码！',trigger:'submit' }
                        ],
                        password: [
                            { required: true, message: '请输入密码！',trigger:'submit'}
                        ],
                    },
                    isAuto:false,
                    agreementCheck: false,
                    hasClick:true,
                    codeErrorText:'',
                    passwordErrorText:'',
                    qrCodeUrl:'',
                    qrCodeToken:'',
                    // 扫码状态、0未扫码，1已扫码，2确认登录、3已过期
                    qrCodeStatus:'',
                    imgLoad:false,
                    btnLoading:false,
                    protocolList: [],
                }
            },
            mounted(){
                // 刷新页面- 更新二维码
                this.getQrCode(false)
                this.setIsAuto()
                this.fetchProvacyPolicy()
                window.addEventListener('keydown', this.handleEnterKey);
            },
            methods:{
                handleEnterKey(event) {
                    if (event.key === 'Enter') {
                       this.handleSubmit();
                    }
                },
                setIsAuto(){
                    const cookies = document.cookie;
                    const match = cookies.match(/Remember-Me=([^;]+)/);
                    const remember =  match ? match[1] : null;
                    if(remember == null){
                        this.isAuto = true;
                        return;
                    }
                    this.isAuto =  remember == '1' ? true : false
                },
                goHome(){
                    window.open(window.location.origin)
                },
                async getCode(){
                    if(!this.hasClick) return;
                    const self = this
                    this.$refs.formValidate.validateField('phone',(err)=>{
                        if(!err){
                            //显示验证码弹框
                            if(captcha){
                                captcha.captchaVerifyCallback = captchaVerifyCallback
                                captcha.onBizResultCallback = onBizResultCallback
                                captcha.show()
                            }else {
                                showCaptcha({
                                    captchaVerifyCallback: captchaVerifyCallback,
                                    onBizResultCallback: onBizResultCallback,
                                })
                            }

                        }
                    });


                    let errMsg = ''
                    async function captchaVerifyCallback(captchaVerifyParam) {
                        try {
                            const result = await $.ajax({
                                url: "/auth-new/get-phone-login-code",
                                type: "post",
                                data:{
                                    "phone": self.formData.phone,
                                    "ali_captcha_verify_param": captchaVerifyParam // 验证码参数
                                },
                            })
                            const verifyResult = {
                              captchaResult: result.data.ali_verify_captcha, // 验证码验证是否通过，boolean类型，必选
                              bizResult: false,      // 业务是否通过，boolean类型，可选
                            };
                            if (result.status == 0) {
                                verifyResult.bizResult = true
                            }else{
                                errMsg = result.message
                            }
                            return verifyResult;
                        }catch(err){
                            console.error('err',err)
                            errMsg = '未知错误，请稍后重试!'
                            return {captchaResult: false,bizResult:false};
                        }
                    }

                    //业务请求验证结果回调函数
                    function onBizResultCallback(bizResult) {
                        if (bizResult === true) {
                            self.hasClick = false;
                            self.codeBtnText = `重新发送(${sec}s)`
                            times = setInterval(() => {
                                if(sec <= 0){
                                    sec = 60;
                                    self.codeBtnText = `获取验证码`
                                    clearInterval(times)
                                    times = null
                                    self.hasClick = true;
                                    return
                                }
                                sec -= 1;
                                self.codeBtnText = `重新发送(${sec}s)`
                            }, 1000);
                        } else{
                            self.$Message.error({
                                content: errMsg,
                                duration: 3,
                                onClose: () => {
                                    self.hasClick = true;
                                }
                            });
                        }
                    }
                },
                handleSubmit(name) {
                    if (!this.agreementCheck) {
                        this.$Message.error('请先阅读并同意协议');
                        return;
                    }
                    this.$refs.formValidate.validate((valid) => {
                        if (valid) {
                            this.submit()
                        }
                    })
                },
                clearCodeErrorText(){
                    this.codeErrorText = ''
                },
                clearPasswordErrorText(){
                    this.passwordErrorText =  ""
                },
                async submit(){
                    const self = this
                    this.btnLoading = true
                    this.clearCodeErrorText()
                    this.clearPasswordErrorText()
                    let dataObject = {}
                    let ajaxUrl;
                    if(this.loginType == 'smsLogin') {
                        ajaxUrl = '/auth-new/phone-login'
                        dataObject = {
                            phone: this.formData.phone,
                            code: this.formData.code,
                            remember: this.isAuto ? '1' : '0'
                        }
                    }else {
                        const { encrypted, iv } = await encryptAES(this.formData.password)
                        const imBack = new URLSearchParams(window.location.search).get('im_back');
                        ajaxUrl = '/auth-iframe/login';
                        if (imBack) {
                            ajaxUrl += '?im_back=' + imBack;
                        }
                        dataObject = {
                            phone: this.formData.phone,
                            password: encrypted,
                            rememberMe: this.isAuto ? '1' : '0',
                            auth_type: 'server',
                            reload: 1,
                            iv,
                        }
                    }
                    $.ajax({
                        url: ajaxUrl,
                        type: "POST",
                        dataType: "json",
                        data: dataObject,
                        success:  (res) => {
                            if(res.status === 0){
                                jumpUrl = res.jump_url ?? '';
                                if (jumpUrl !== '') {
                                    window.location.href = jumpUrl.replace(/www/, 'admin')
                                } else {
                                    window.location.href = window.location.origin.replace(/www/, 'admin')
                                }
                            }else if(res.status === 604){
                                // console.log('进入604了')
                                //显示验证码弹框
                                if(captcha){
                                    captcha.captchaVerifyCallback = captchaVerifyCallback
                                    captcha.onBizResultCallback = onBizResultCallback
                                    captcha.show()
                                }else {
                                    showCaptcha({
                                        captchaVerifyCallback: captchaVerifyCallback,
                                        onBizResultCallback: onBizResultCallback,
                                    })
                                }

                                let errMsg = ''
                                async function captchaVerifyCallback(captchaVerifyParam) {
                                    try {
                                        const { encrypted, iv } = await encryptAES(self.formData.password)
                                        const result = await $.ajax({
                                            url: "/auth-iframe/login",
                                            type: "POST",
                                            dataType:"json",
                                            data: {
                                                phone:self.formData.phone,
                                                password: encrypted,
                                                iv,
                                                auth_type: 'server',
                                                "ali_captcha_verify_param": captchaVerifyParam // 验证码参数
                                            },
                                        })

                                        // 从结果中获取验证码验证结果，如果不存在则默认为true
                                        let captchaResult = (result && result.ali_verify_captcha) ?? true;

                                        const verifyResult = {
                                          captchaResult, // 验证码验证是否通过，boolean类型，必选
                                          bizResult: false,      // 业务是否通过，boolean类型，可选
                                        };
                                        if (result.status == 0) {
                                            verifyResult.bizResult = true
                                        }else{
                                            errMsg = result.error || result.message
                                        }
                                        if(errMsg == '验证码错误'){
                                            self.codeErrorText = errMsg
                                        }
                                        if(res.target == 'password'){
                                            self.passwordErrorText = errMsg
                                        }
                                        return verifyResult;
                                    }catch(err){
                                        console.error('err',err)
                                        errMsg = '未知错误，请稍后重试!'
                                        return {captchaResult: false,bizResult:false};
                                    }
                                }
                                //业务请求验证结果回调函数
                                function onBizResultCallback(bizResult) {
                                    if (bizResult === true) {
                                        window.location.href = window.location.origin.replace(/www/, 'admin')
                                    }else {
                                        self.$Message.error({
                                            content: errMsg,
                                            duration: 3,
                                            onClose: () => {
                                                self.hasClick = true;
                                            }
                                         });
                                    }
                                }
                            }else {
                                const  errMsg = res.error || res.message
                                this.$Message.error({
                                    content: errMsg,
                                    duration: 3,
                                });
                                // this.$Modal.error({
                                //     title: '提示',
                                //     content: errMsg
                                // });
                                if(errMsg == '验证码错误'){
                                    this.codeErrorText = errMsg
                                }
                                if(res.target == 'password'){
                                    this.passwordErrorText = errMsg
                                }

                            }
                        },
                        complete: () => {
                            self.btnLoading = false
                        }

                    })
                },

                    window.open('https://www.wjx.cn/vm/YDBYjzG.aspx#')

                    $.ajax({
                        url: '/auth-iframe/check-scan-status',
                        type: "GET",

                        data,
                        success:  (res) => {
                            // 扫码状态、0未扫码，1已扫码，2确认登录、3已过期
                            this.qrCodeStatus = res.data.status
                            // 登录成功
                            if(res.data.status === 2) {
                                clearInterval(codeStatusTimes);
                                window.location.href = window.location.origin.replace(/www/, 'admin')
                            }else if( res.data.status === 3) {
                                clearInterval(codeStatusTimes);
                            }

                        }
                    })
                },
                interval(){
                    codeStatusTimes = setInterval(() => {
                            this.checkQrCodeStatus()
                    }, 1000);
                },
                // 刷新二维码
                refreshQrCode(){
                    this.qrCodeStatus = ''
                    this.getQrCode()
                    this.interval()
                },
                userAgreement() {
                this.openProtocol('用户协议')
                },
                privacyAgreement() {
                    this.openProtocol('隐私协议')
                },
                async openProtocol(type) {
                    if (!this.protocolList.length) {
                        await this.fetchProvacyPolicy();
                    }
                    const protocol = this.protocolList.find(item => item.name === type);
                    if (protocol && protocol.url) {
                        window.open(protocol.url, '_blank');
                    } else {
                        this.$Message.error('暂无该协议');
                    }
                },
                // 获取隐私政策
                async fetchProvacyPolicy() {
                    const res = await $.ajax({
                        url: '/client-protocol/list?terminal=pc.merchant&is_history=2',
                        type: 'get',
                    });
                    this.protocolList = res.data ||  []
                },
            },
            //页面卸载
            beforeDestroy() {
                window.removeEventListener('keydown', this.handleEnterKey);
                if (times) {
                    clearInterval(times);
                    times = null;
                }
                if(codeStatusTimes){
                    clearInterval(codeStatusTimes);
                    codeStatusTimes = null;
                }
            }
        })
    })
</script>
